    - data:
        code: |-
          import json
          import re
          from datetime import datetime, timedelta


          PREVIEW_BASE_TIME = datetime(2026, 7, 22, 12, 0)


          def _valid_waybill(value):
              value = str(value or "").strip().upper()
              if re.fullmatch(r"JT\d{8,13}", value):
                  return True
              if re.fullmatch(r"\d{10,15}", value):
                  return not (len(value) == 11 and re.fullmatch(r"1[3-9]\d{9}", value))
              return False


          def _time(hours):
              # 固定预览时间，避免重复查询时产生并不存在的“新轨迹”。
              return (PREVIEW_BASE_TIME + timedelta(hours=hours)).strftime("%Y-%m-%d %H:%M")


          def main(waybill_no: str, level3_intent: str, user_query: str, pending_task_hint: str, pending_task_ready_hint: str) -> dict:
              # 开发预览占位。正式环境将本节点替换为 query_expedite_snapshot 自定义 Tool。
              # Tool 内部固定执行：运单详情 -> 订单兜底 -> 取消订单过滤 -> 对外轨迹 -> 状态归一化。
              waybill_no = str(waybill_no or "").strip().upper()
              level3_intent = str(level3_intent or "").strip()
              pending_task_hint = str(pending_task_hint or "").strip()
              pending_task_ready_hint = str(pending_task_ready_hint or "").strip()
              latest_track = {}
              events = []
              retryable = False
              error_code = ""

              if not _valid_waybill(waybill_no) or waybill_no.endswith("00"):
                  status = "INVALID_WAYBILL"
                  error_code = "INVALID_WAYBILL"
              elif waybill_no.endswith("99"):
                  status = "SYSTEM_ERROR"
                  retryable = True
                  error_code = "UPSTREAM_TIMEOUT"
              else:
                  bucket = int(re.findall(r"\d", waybill_no)[-1])
                  if bucket == 0:
                      status = "TRACK_EMPTY"
                  elif bucket in (1, 2, 3):
                      status = "IN_TRANSIT"
                      events = [
                          {"scanTime": _time(-30), "rawStatus": "已揽件", "scanTypeName": "揽收", "networkName": "始发网点", "customerTracking": "快件已揽收"},
                          {"scanTime": _time(-8), "rawStatus": "运送中", "scanTypeName": "到件", "networkName": "上海转运中心", "customerTracking": "快件已到达上海转运中心，等待中转"},
                      ]
                  elif bucket in (4, 5):
                      status = "OUT_FOR_DELIVERY"
                      events = [
                          {"scanTime": _time(-14), "rawStatus": "运送中", "scanTypeName": "到件", "networkName": "目的地网点", "customerTracking": "快件已到达目的地网点"},
                          {"scanTime": _time(-3), "rawStatus": "派送中", "scanTypeName": "派件", "networkName": "目的地网点", "customerTracking": "快件正在派送中"},
                      ]
                  elif bucket == 6:
                      status = "SELF_PICKUP"
                      events = [
                          {"scanTime": _time(-4), "rawStatus": "已代收", "scanTypeName": "代收", "networkName": "目的地网点", "customerTracking": "快件已由代收点代收，请按通知取件"},
                      ]
                  elif bucket in (7, 8):
                      status = "SIGNED"
                      events = [
                          {"scanTime": _time(-24), "rawStatus": "已签收", "scanTypeName": "签收", "networkName": "目的地网点", "customerTracking": "快件已签收，签收人：门卫/前台"},
                      ]
                  else:
                      status = "UNKNOWN"
                      events = [
                          {"scanTime": _time(-10), "rawStatus": "异常留置", "scanTypeName": "其他", "networkName": "异常件处理中心", "customerTracking": "当前物流状态待进一步核实"},
                      ]

              if events:
                  # 正式 Tool 必须按扫描时间确认最新轨迹，不能假设上游首条永远最新。
                  events = sorted(events, key=lambda item: item.get("scanTime", ""), reverse=True)
                  latest_track = events[0]

              latest_text = ""
              if latest_track:
                  latest_text = "\n最新轨迹：{}｜{}｜{}".format(
                      latest_track.get("scanTime", ""),
                      latest_track.get("networkName", ""),
                      latest_track.get("customerTracking", ""),
                  )

              replies = {
                  "INVALID_WAYBILL": f"未查询到运单 {waybill_no} 的有效信息，请核对运单号后重新发送。",
                  "TRACK_EMPTY": f"运单 {waybill_no} 有效，但当前还没有物流轨迹，可能尚未完成揽收。建议稍后再查询。",
                  "IN_TRANSIT": f"运单 {waybill_no} 当前处于中转运输中，请留意后续轨迹更新。{latest_text}",
                  "OUT_FOR_DELIVERY": f"运单 {waybill_no} 当前正在派送，请保持电话畅通并留意派件员联系。{latest_text}",
                  "SELF_PICKUP": f"运单 {waybill_no} 当前显示已由代收点或网点代收。{latest_text}\n请确认您是否愿意按通知自行取件，并回复“是”或“否”。",
                  "SIGNED": f"运单 {waybill_no} 当前显示已签收。{latest_text}\n请确认您是否已经收到包裹，并回复“已收到”或“未收到”。",
                  "UNKNOWN": f"已查到运单 {waybill_no} 的物流轨迹，但当前状态暂无法自动识别。{latest_text}\n建议转人工客服进一步核实。",
                  "SYSTEM_ERROR": "物流系统暂时繁忙，本次没有取得可靠结果。请稍后重试；如多次失败，可转人工客服核实。",
              }
              if status == "TRACK_EMPTY":
                  if level3_intent == "ask_delay_reason":
                      replies[status] = f"运单 {waybill_no} 当前还没有物流轨迹，现有数据无法判断具体延误原因，可能尚未完成揽收。建议稍后再查询。"
                  elif level3_intent == "ask_delivery_eta":
                      replies[status] = f"运单 {waybill_no} 尚无物流轨迹，当前 Tool 也没有返回 ETA，暂时无法准确预计送达时间。"
                  elif level3_intent == "tracking_not_updated":
                      replies[status] = f"运单 {waybill_no} 有效，但当前没有可展示轨迹，可能尚未完成揽收；本次未将接口空数据解释为新轨迹。"
                  elif level3_intent == "urge_delivery":
                      replies[status] = f"已核对运单 {waybill_no}，当前还没有物流轨迹。预览 Tool 尚未接入真实可催规则和工单结果，本轮没有创建催件单。"
              elif status in {"IN_TRANSIT", "OUT_FOR_DELIVERY"}:
                  status_text = "中转运输中" if status == "IN_TRANSIT" else "派送中"
                  if level3_intent == "ask_delay_reason":
                      replies[status] = f"运单 {waybill_no} 当前为{status_text}。现有轨迹没有返回明确延误原因，我不会猜测天气、爆仓或网点异常。{latest_text}"
                  elif level3_intent == "ask_delivery_eta":
                      replies[status] = f"运单 {waybill_no} 当前为{status_text}。本次 Tool 未返回 ETA，暂时无法给出准确送达时间，请以后续实时轨迹为准。{latest_text}"
                  elif level3_intent == "tracking_not_updated":
                      replies[status] = f"运单 {waybill_no} 当前为{status_text}，最新可见轨迹如下。预览 Tool 尚未返回“超过多久算异常”的规则结果，因此不会自动判定延误。{latest_text}"
                  elif level3_intent == "urge_delivery":
                      replies[status] = f"已先核对运单 {waybill_no}，当前为{status_text}。预览 Tool 尚未接入真实可催规则和建单结果，本轮没有创建催件单。{latest_text}"
              next_steps = {
                  "INVALID_WAYBILL": "waiting_waybill",
                  "SELF_PICKUP": "waiting_self_pickup_confirmation",
                  "SIGNED": "waiting_signed_confirmation",
                  "SYSTEM_ERROR": "retry_expedite_query",
              }
              result = {
                  "success": status not in {"INVALID_WAYBILL", "SYSTEM_ERROR"},
                  "statusCode": status,
                  "waybillNo": waybill_no,
                  "latestTrack": latest_track,
                  "events": events,
                  "cardData": {"waybillNo": waybill_no, "statusCode": status, "latestTrack": latest_track, "events": events},
                  "errorCode": error_code or None,
                  "retryable": retryable,
                  "traceId": "PREVIEW-ONLY",
              }
              summary = f"催查件查询状态：{status}；运单号：{waybill_no}。"
              next_step = next_steps.get(status, "completed")
              flow_reply = "【开发预览数据】" + replies[status]
              selected_hint = pending_task_ready_hint if next_step in {"completed", "waiting_waybill"} else pending_task_hint
              if selected_hint:
                  flow_reply += "\n\n" + selected_hint
              return {
                  "normalized_status": status,
                  "tool_status": "failed" if status == "SYSTEM_ERROR" else ("business_rejected" if status == "INVALID_WAYBILL" else "success"),
                  "tool_summary": summary,
                  "tool_result": json.dumps(result, ensure_ascii=False),
                  "tracking_card_json": json.dumps(result["cardData"], ensure_ascii=False),
                  "flow_reply": flow_reply,
                  "next_step": next_step,
                  "resolved_waybill_no": "" if status == "INVALID_WAYBILL" else waybill_no,
              }
        code_language: python3
        desc: 按真实接口文档定义 query_expedite_snapshot 的稳定输入输出；当前为可运行预览，正式环境替换为同名只读业务 Tool
        outputs:
          flow_reply:
            type: string
          next_step:
            type: string
          normalized_status:
            type: string
          resolved_waybill_no:
            type: string
          tool_result:
            type: string
          tool_status:
            type: string
          tool_summary:
            type: string
          tracking_card_json:
            type: string
        selected: false
        title: Tool接入位-查询催查件快照
        type: code
        variables:
        - value_selector:
          - code_parse
          - waybill_no
          variable: waybill_no
