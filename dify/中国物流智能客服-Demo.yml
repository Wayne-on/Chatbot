    - data:
        code: |-
          import json
          import re
          import hashlib
          from datetime import datetime, timedelta


          def _clean(s):
              return (s or "").strip()


          def _is_valid_waybill(waybill_no):
              waybill_no = _clean(waybill_no).upper()
              if re.fullmatch(r"JT\d{8,13}", waybill_no):
                  return True
              if re.fullmatch(r"\d{10,15}", waybill_no):
                  return not (len(waybill_no) == 11 and re.fullmatch(r"1[3-9]\d{9}", waybill_no))
              return False


          def _bucket(waybill_no):
              waybill_no = _clean(waybill_no)
              digits = re.findall(r"\d", waybill_no)
              if digits:
                  return int(digits[-1])
              return int(hashlib.md5(waybill_no.encode("utf-8")).hexdigest(), 16) % 10


          def _now_text(hours_delta=0):
              # Demo 用当前时间生成相对真实的轨迹时间
              t = datetime.now() + timedelta(hours=hours_delta)
              return t.strftime("%Y-%m-%d %H:%M")


          def _mock_track_profile(waybill_no, country):
              b = _bucket(waybill_no)
              country = country or "CN"
              if b in [0, 1, 2]:
                  status = "in_transit"
                  status_cn = "运输中"
                  current_node = "上海转运中心"
                  exception = ""
                  can_urge = False
                  eta = "预计 1-2 天内到达下一站"
                  events = [
                      {"time": _now_text(-38), "node": "始发网点", "desc": "快件已揽收"},
                      {"time": _now_text(-26), "node": "始发分拨中心", "desc": "快件已发出"},
                      {"time": _now_text(-8), "node": current_node, "desc": "快件到达转运中心，等待中转"},
                  ]
              elif b in [3, 4]:
                  status = "out_for_delivery"
                  status_cn = "派送中"
                  current_node = "目的地网点"
                  exception = ""
                  can_urge = False
                  eta = "预计今日完成派送"
                  events = [
                      {"time": _now_text(-30), "node": "目的地分拨中心", "desc": "快件到达目的地城市"},
                      {"time": _now_text(-16), "node": "目的地网点", "desc": "快件到达派件网点"},
                      {"time": _now_text(-3), "node": current_node, "desc": "快件正在派送中"},
                  ]
              elif b in [5, 6]:
                  status = "signed"
                  status_cn = "已签收"
                  current_node = "目的地网点"
                  exception = ""
                  can_urge = False
                  eta = "已完成签收"
                  events = [
                      {"time": _now_text(-36), "node": "目的地网点", "desc": "快件到达派件网点"},
                      {"time": _now_text(-28), "node": "目的地网点", "desc": "快件正在派送中"},
                      {"time": _now_text(-24), "node": current_node, "desc": "快件已签收，签收人：门卫/前台"},
                  ]
              elif b in [7, 8]:
                  status = "delayed"
                  status_cn = "运输延迟"
                  current_node = "华东分拨中心"
                  exception = "轨迹超过 48 小时未更新"
                  can_urge = True
                  eta = "建议发起催查，具体时效以网点核实为准"
                  events = [
                      {"time": _now_text(-72), "node": "始发网点", "desc": "快件已揽收"},
                      {"time": _now_text(-60), "node": "始发分拨中心", "desc": "快件已发出"},
                      {"time": _now_text(-50), "node": current_node, "desc": "快件到达分拨中心，后续轨迹暂未更新"},
                  ]
              else:
                  status = "exception"
                  status_cn = "异常处理中"
                  current_node = "异常件处理中心"
                  exception = "疑似地址异常或包裹异常，需人工核实"
                  can_urge = True
                  eta = "建议转人工或创建核实工单"
                  events = [
                      {"time": _now_text(-48), "node": "目的地分拨中心", "desc": "快件到达目的地城市"},
                      {"time": _now_text(-30), "node": current_node, "desc": "快件进入异常处理流程"},
                  ]
              return {
                  "waybill_no": waybill_no,
                  "country": country,
                  "status": status,
                  "status_cn": status_cn,
                  "current_node": current_node,
                  "exception": exception,
                  "can_urge": can_urge,
                  "eta": eta,
                  "events": events,
              }


          def mock_query_track(waybill_no, country, channel, scenario):
              profile = _mock_track_profile(waybill_no, country)
              summary = f"当前状态：{profile['status_cn']}；当前位置：{profile['current_node']}；{profile['eta']}。"
              if profile.get("exception"):
                  summary += f" 异常说明：{profile['exception']}。"
              return {
                  "tool": "query_track",
                  "success": True,
                  "summary": summary,
                  "data": profile,
                  "next_action_suggestion": "可直接向用户解释轨迹状态" if not profile["can_urge"] else "建议引导用户发起催查或转人工核实",
              }


          def mock_query_package_volume(waybill_no, country, channel):
              bucket = _bucket(waybill_no)
              length_cm = 24 + bucket
              width_cm = 16 + (bucket % 4)
              height_cm = 10 + (bucket % 3)
              volume_cm3 = length_cm * width_cm * height_cm
              volumetric_weight_kg = round(volume_cm3 / 6000, 2)
              return {
                  "tool": "query_package_volume",
                  "success": True,
                  "summary": (
                      f"包裹尺寸约为 {length_cm}×{width_cm}×{height_cm} 厘米，"
                      f"体积 {volume_cm3} 立方厘米，体积重约 {volumetric_weight_kg} 千克。"
                  ),
                  "data": {
                      "waybill_no": waybill_no,
                      "length_cm": length_cm,
                      "width_cm": width_cm,
                      "height_cm": height_cm,
                      "volume_cm3": volume_cm3,
                      "volumetric_weight_kg": volumetric_weight_kg,
                  },
                  "next_action_suggestion": "如涉及计费，以正式称重和业务系统计费结果为准。",
              }


          def mock_query_pod(waybill_no, country, channel):
              profile = _mock_track_profile(waybill_no, country)
              if profile["status"] != "signed":
                  result = {
                      "tool": "query_pod",
                      "success": True,
                      "has_pod": False,
                      "summary": f"该运单当前状态为{profile['status_cn']}，暂未查询到签收凭证。",
                      "data": {
                          "waybill_no": waybill_no,
                          "signed": False,
                          "current_status": profile["status_cn"],
                          "latest_event": profile["events"][-1],
                      },
                      "next_action_suggestion": "请先按当前轨迹状态解释；如用户坚持未收到，可转人工或创建核实工单。",
                  }
              else:
                  result = {
                      "tool": "query_pod",
                      "success": True,
                      "has_pod": True,
                      "summary": "已查询到签收信息：签收人显示为门卫/前台，签收时间为最近一次签收轨迹时间。",
                      "data": {
                          "waybill_no": waybill_no,
                          "signed": True,
                          "signed_time": profile["events"][-1]["time"],
                          "signer": "门卫/前台",
                          "pod_type": "电子签收记录",
                          "pod_available": True,
                      },
                      "next_action_suggestion": "建议用户先与门卫/前台核实；如仍未找到，可发起签收未收到核实。",
                  }
              return result


          def mock_create_ticket(waybill_no, phone, scenario, user_query, business_reason):
              profile = _mock_track_profile(waybill_no, "CN")
              ticket_type_map = {
                  "delivery_followup": "催查件",
                  "delivered_not_received": "签收未收到核实",
                  "complaint": "投诉/理赔预受理",
                  "tracking": "轨迹异常核实",
                  "change_address": "改址协助",
              }
              ticket_type = ticket_type_map.get(scenario, "客服核实工单")
              ticket_id = "MOCK" + hashlib.md5((waybill_no + scenario + user_query).encode("utf-8")).hexdigest()[:10].upper()
              return {
                  "tool": "create_ticket",
                  "success": True,
                  "summary": f"已模拟创建{ticket_type}，工单号：{ticket_id}。",
                  "data": {
                      "ticket_id": ticket_id,
                      "ticket_type": ticket_type,
                      "waybill_no": waybill_no,
                      "phone": phone or "未提供",
                      "current_status": profile["status_cn"],
                      "user_query": user_query,
                      "reason": business_reason,
                      "expected_followup": "网点/客服将在 24 小时内核实，具体以实际系统为准",
                  },
                  "next_action_suggestion": "向用户说明已登记核实诉求，并提醒保持电话畅通。",
              }


          def mock_change_address_check(waybill_no, country, channel, user_query):
              profile = _mock_track_profile(waybill_no, country)
              status = profile["status"]
              if status in ["in_transit", "delayed"]:
                  can_change = True
                  reason = "快件尚未进入末端派送或已出现运输延迟，可尝试提交改址申请。"
                  required_info = ["新收件地址", "收件人姓名", "收件人手机号"]
                  next_step = "请用户确认新地址信息后，再调用正式改址接口。"
              elif status == "out_for_delivery":
                  can_change = False
                  reason = "快件已在派送中，通常不建议直接改址，可先联系派件员或转人工确认。"
                  required_info = []
                  next_step = "建议转人工或提示用户等待派件员联系。"
              elif status == "signed":
                  can_change = False
                  reason = "快件已签收，无法再发起改址。"
                  required_info = []
                  next_step = "如用户未收到，应转入签收未收到核实流程。"
              else:
                  can_change = False
                  reason = "快件处于异常处理中，需先核实异常原因，再判断是否可改址。"
                  required_info = []
                  next_step = "建议创建核实工单或转人工处理。"
              return {
                  "tool": "change_address_check",
                  "success": True,
                  "summary": "可改址" if can_change else "暂不支持直接改址",
                  "data": {
                      "waybill_no": waybill_no,
                      "can_change": can_change,
                      "current_status": profile["status_cn"],
                      "reason": reason,
                      "required_info": required_info,
                      "next_step": next_step,
                  },
                  "next_action_suggestion": next_step,
              }


          def main(waybill_no: str, phone: str, scenario: str, tool_name: str, user_query: str, business_reason: str) -> dict:
              waybill_no = _clean(waybill_no).upper()
              tool_name = _clean(tool_name)
              scenario = _clean(scenario)
              country = "CN"
              channel = "im"

              if tool_name in ["none", "", "null"]:
                  result = {
                      "tool": "none",
                      "success": True,
                      "summary": "当前问题不需要调用模拟工具，可走知识回复或普通客服回复。",
                      "data": {},
                      "next_action_suggestion": "直接回复或进入知识检索。",
                  }
                  return {
                      "tool_status": "success",
                      "tool_summary": result["summary"],
                      "tool_result": json.dumps(result, ensure_ascii=False),
                      "next_step": "completed",
                  }

              if not _is_valid_waybill(waybill_no):
                  result = {
                      "tool": tool_name,
                      "success": False,
                      "error_code": "INVALID_WAYBILL_NO",
                      "summary": "运单号格式不完整或不符合 Demo 校验规则，无法调用模拟工具。",
                      "data": {"waybill_no": waybill_no},
                      "next_action_suggestion": "请用户重新提供正确运单号。",
                  }
                  return {
                      "tool_status": "failed",
                      "tool_summary": result["summary"],
                      "tool_result": json.dumps(result, ensure_ascii=False),
                      "next_step": "waiting_waybill",
                  }

              if tool_name == "query_track":
                  result = mock_query_track(waybill_no, country, channel, scenario)
              elif tool_name == "query_package_volume":
                  result = mock_query_package_volume(waybill_no, country, channel)
              elif tool_name == "query_pod":
                  result = mock_query_pod(waybill_no, country, channel)
              elif tool_name == "create_ticket":
                  result = mock_create_ticket(waybill_no, phone, scenario, user_query, business_reason)
              elif tool_name == "change_address_check":
                  result = mock_change_address_check(waybill_no, country, channel, user_query)
              else:
                  result = {
                      "tool": tool_name,
                      "success": False,
                      "error_code": "UNKNOWN_TOOL",
                      "summary": f"未识别的模拟工具：{tool_name}。",
                      "data": {},
                      "next_action_suggestion": "转知识回复或转人工。",
                  }

              return {
                  "tool_status": "success" if result.get("success") else "failed",
                  "tool_summary": result.get("summary", ""),
                  "tool_result": json.dumps(result, ensure_ascii=False),
                  "next_step": "completed" if result.get("success") else "retry_tool",
              }
