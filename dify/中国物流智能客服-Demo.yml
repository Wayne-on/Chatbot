        code: |-
          import json


          def main(waybill_no: str, customer_phone: str, problem_description: str, conversation_id: str) -> dict:
              # 正式环境替换为 create_expedite_work_order 自定义 Tool。
              # firstTypeCode、secondTypeCode、Long sessionId、渠道、鉴权、幂等键必须由 Tool 服务端注入，禁止由模型生成。
              waybill_no = str(waybill_no or "").strip().upper()
              customer_phone = str(customer_phone or "").strip()
              problem_description = str(problem_description or "").strip()[:500]
              conversation_id = str(conversation_id or "").strip()
              if not waybill_no or not customer_phone or not problem_description:
                  message = "工单参数不完整，本次没有提交。请重新补充信息或转人工客服。"
                  error_code = "INVALID_ARGUMENT"
              else:
                  message = "工单资料已收集并通过用户确认，但正式工单 Tool 尚未绑定，本次没有提交真实工单。请在联调后替换该接入位。"
                  error_code = "TOOL_NOT_CONFIGURED"
              result = {
                  "success": False,
                  "status": "FAILED",
                  "requestId": conversation_id,
                  "workOrderId": None,
                  "message": message,
                  "errorCode": error_code,
                  "retryable": False,
                  "traceId": "PREVIEW-ONLY",
              }
              return {
                  "tool_status": "failed",
                  "tool_summary": f"催查件工单未提交：{error_code}。",
                  "tool_result": json.dumps(result, ensure_ascii=False),
                  "flow_reply": message,
                  "next_step": "work_order_tool_not_configured",
              }
        code_language: python3
        desc: 用户明确确认后才到达；当前安全失败且不伪造工单，正式环境替换为同名写业务 Tool
