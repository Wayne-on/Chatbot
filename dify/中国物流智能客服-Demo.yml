    - data:
        code: |-
          import json
          import re

          SCENARIO_ALIASES = {
              "track": "tracking",
              "urge_delivery": "delivery_followup",
              "signed_not_received": "delivered_not_received",
              "complaint_claim": "complaint",
              "faq_policy": "faq",
              "unclear": "fallback",
              "other": "fallback",
          }
          ALLOWED_SCENARIOS = {
              "tracking",
              "query_package_volume",
              "delivery_followup",
              "delivered_not_received",
              "change_address",
              "complaint",
              "query_complaint",
              "faq",
              "conversation",
              "fallback",
          }
          SCENARIO_DEFAULT_TOOL = {
              "tracking": "query_track",
              "query_package_volume": "query_package_volume",
              "delivery_followup": "query_expedite_snapshot",
              "delivered_not_received": "query_pod",
              "change_address": "change_address_check",
              "complaint": "create_ticket",
              "query_complaint": "none",
              "faq": "none",
              "conversation": "none",
              "fallback": "none",
          }
          NEED_WAYBILL = {
              "tracking",
              "query_package_volume",
              "delivery_followup",
              "delivered_not_received",
              "change_address",
              "complaint",
          }
          WRITE_TOOLS = {"create_ticket", "create_expedite_work_order"}
          CONFIRM_WORDS = {"确认", "确定", "同意", "提交", "可以提交", "确认提交", "是的"}
          CANCEL_WORDS = {"取消", "算了", "不用了", "不提交", "取消操作"}
          YES_WORDS = {"是", "是的", "对", "可以", "能", "已收到", "收到了", "我收到了", "自己取", "我自己取", "去取"}
          NO_WORDS = {"否", "不是", "不", "不可以", "不能", "未收到", "没收到", "没有收到", "不去取", "不自取"}
          HUMAN_MARKERS = ("人工客服", "转人工", "真人客服", "人工处理", "客服人员")


          def _s(value):
              return str(value or "").strip()


          def _compact(text):
              return re.sub(r"[\s，。！？、,.!?；;：:]+", "", _s(text))


          def _yes_no(text):
              value = _compact(text)
              if value in YES_WORDS:
                  return "yes"
              if value in NO_WORDS:
                  return "no"
              return ""


          def _mask_phone(phone):
              value = _s(phone)
              return value[:3] + "****" + value[-4:] if len(value) >= 7 else value


          def _normalize_scenario(value):
              scenario = SCENARIO_ALIASES.get(_s(value), _s(value))
              return scenario if scenario in ALLOWED_SCENARIOS else ""


          def _is_waybill(value):
              candidate = re.sub(r"[\s-]", "", _s(value).upper())
              if re.fullmatch(r"JT\d{8,13}", candidate):
                  return True
              if re.fullmatch(r"\d{10,15}", candidate):
                  return not (len(candidate) == 11 and re.fullmatch(r"1[3-9]\d{9}", candidate))
              return False


          def _normalize_waybill(value):
              candidate = re.sub(r"[\s-]", "", _s(value).upper())
              return candidate if _is_waybill(candidate) else ""


          def _extract_waybill(text):
              compact = re.sub(r"[\s-]", "", _s(text).upper())
              match = re.search(r"JT\d{8,13}", compact)
              if match:
                  return match.group(0)
              for match in re.finditer(r"(?<!\d)\d{10,15}(?!\d)", compact):
                  candidate = match.group(0)
                  if _is_waybill(candidate):
                      return candidate
              return ""


          def _extract_phone(text):
              source = _s(text)
              source = re.sub(r"JT[\s-]*\d(?:[\s-]*\d){7,12}", " ", source, flags=re.I)
              for match in re.finditer(r"(?<!\d)1[3-9]\d{9}(?!\d)", source):
                  return match.group(0)
              return ""


          def _looks_like_waybill_only(query):
              return _is_waybill(_compact(query))


          def _as_bool(value):
              if isinstance(value, bool):
                  return value
              return _s(value).lower() in {"true", "1", "yes", "是", "需要"}


          def _confidence(value):
              try:
                  return max(0.0, min(1.0, float(value)))
              except Exception:
                  return 0.0


          def _parse_json(raw):
              text = _s(raw)
              start = text.find("{")
              if start < 0:
                  return {}
              try:
                  value, _ = json.JSONDecoder().raw_decode(text[start:])
                  return value if isinstance(value, dict) else {}
              except Exception:
                  return {}


          def _fallback_scenario(query, previous):
              q = _s(query)
              keyword_groups = (
                  ("delivered_not_received", ("签收但没收到", "显示签收", "签收未收到", "本人未收到")),
                  ("query_package_volume", ("体积", "尺寸", "长宽高", "体积重")),
                  ("query_complaint", ("工单进度", "投诉进度", "处理进度", "工单状态")),
                  ("change_address", ("改地址", "修改地址", "改电话", "预约派送", "改期")),
                  ("complaint", ("投诉", "理赔", "赔付", "破损", "遗失", "丢失")),
                  ("delivery_followup", ("催件", "催派", "一直没更新", "物流没更新", "太慢", "还没送")),
                  ("faq", ("能不能寄", "禁寄", "时效", "多久能到", "怎么收费", "规则")),
                  ("tracking", ("查件", "查快递", "物流轨迹", "到哪里", "到哪了")),
              )
              for scenario, keywords in keyword_groups:
                  if any(keyword in q for keyword in keywords):
                      return scenario
              if _looks_like_waybill_only(q) and previous:
                  return previous
              if _compact(q) in {"你好", "您好", "在吗", "谢谢", "感谢"}:
                  return "conversation"
              return "fallback"


          def _result(
              scenario,
              confidence,
              waybill_no,
              phone,
              missing,
              tool_name,
              need_human,
              clarify_question,
              business_reason,
              direct_reply,
              pending_action,
              current_step,
              problem_description="",
          ):
              return {
                  "scenario": scenario,
                  "confidence": confidence,
                  "waybill_no": waybill_no,
                  "phone": phone,
                  "missing_slots_text": ",".join(missing),
                  "tool_name": tool_name,
                  "need_human": "true" if need_human else "false",
                  "clarify_question": clarify_question,
                  "business_reason": business_reason,
                  "direct_reply": "true" if direct_reply else "false",
                  "pending_action": pending_action,
                  "current_step": current_step,
                  "problem_description": problem_description,
              }


          # v0.3：分层意图 + 对话行为 + 多意图待办队列。
          LEVEL3_BY_SCENARIO_V3 = {
              "tracking": {"query_current_status", "query_tracking_history"},
              "query_package_volume": {"query_package_dimensions", "query_volume_weight"},
              "delivery_followup": {"urge_delivery", "ask_delay_reason", "ask_delivery_eta", "tracking_not_updated", "self_pickup_not_requested"},
              "delivered_not_received": {"signed_not_received"},
              "change_address": {"change_receiver_address", "change_receiver_phone", "reschedule_delivery"},
              "complaint": {"general_complaint", "claim_damage", "claim_loss"},
              "query_complaint": {"query_ticket_progress"},
              "faq": {"prohibited_items_policy", "price_policy", "transit_time_policy", "service_rule"},
              "conversation": {"greeting", "thanks", "praise_or_polite"},
              "fallback": {"ambiguous_request", "out_of_scope"},
          }
          DEFAULT_LEVEL3_V3 = {
              "tracking": "query_current_status",
              "query_package_volume": "query_package_dimensions",
              "delivery_followup": "urge_delivery",
              "delivered_not_received": "signed_not_received",
              "change_address": "change_receiver_address",
              "complaint": "general_complaint",
              "query_complaint": "query_ticket_progress",
              "faq": "service_rule",
              "conversation": "greeting",
              "fallback": "ambiguous_request",
          }
          INTENT_REGISTRY_V3 = {
              ("tracking", "query_current_status"): ("read_tool", "query_track"),
              ("tracking", "query_tracking_history"): ("read_tool", "query_track"),
              ("query_package_volume", "query_package_dimensions"): ("read_tool", "query_package_volume"),
              ("query_package_volume", "query_volume_weight"): ("read_tool", "query_package_volume"),
              ("delivery_followup", "urge_delivery"): ("read_then_guarded_write", "query_expedite_snapshot"),
              ("delivery_followup", "ask_delay_reason"): ("read_tool", "query_expedite_snapshot"),
              ("delivery_followup", "ask_delivery_eta"): ("read_tool", "query_expedite_snapshot"),
              ("delivery_followup", "tracking_not_updated"): ("read_tool", "query_expedite_snapshot"),
              ("delivery_followup", "self_pickup_not_requested"): ("read_then_guarded_write", "query_expedite_snapshot"),
              ("delivered_not_received", "signed_not_received"): ("read_tool", "query_pod"),
              ("change_address", "change_receiver_address"): ("read_then_guarded_write", "change_address_check"),
              ("change_address", "change_receiver_phone"): ("read_then_guarded_write", "change_address_check"),
              ("change_address", "reschedule_delivery"): ("read_then_guarded_write", "change_address_check"),
              ("complaint", "general_complaint"): ("guarded_write", "create_ticket"),
              ("complaint", "claim_damage"): ("guarded_write", "create_ticket"),
              ("complaint", "claim_loss"): ("guarded_write", "create_ticket"),
              ("query_complaint", "query_ticket_progress"): ("unsupported_or_handoff", "none"),
              ("faq", "prohibited_items_policy"): ("knowledge_rag", "none"),
              ("faq", "price_policy"): ("knowledge_rag", "none"),
              ("faq", "transit_time_policy"): ("knowledge_rag", "none"),
              ("faq", "service_rule"): ("knowledge_rag", "none"),
              ("conversation", "greeting"): ("conversation", "none"),
              ("conversation", "thanks"): ("conversation", "none"),
              ("conversation", "praise_or_polite"): ("conversation", "none"),
              ("fallback", "ambiguous_request"): ("clarify_or_handoff", "none"),
              ("fallback", "out_of_scope"): ("clarify_or_handoff", "none"),
          }
          DIALOGUE_ACTS_V3 = {"new_request", "follow_up", "provide_slot", "confirm", "deny", "cancel", "correct", "switch_task", "human_request", "social", "continue", "unknown"}
          INTENT_RELATIONS_V3 = {"single", "parallel", "sequential", "alternative", "correction", "cancel_previous"}
          TERMINAL_STEPS_V3 = {"idle", "completed", "cancelled", "human_handoff", "signed_not_received_fallback", "work_order_tool_not_configured"}
          CONTINUE_WORDS_V3 = {"继续", "下一个", "下一项", "继续处理", "处理下一项"}


          def _v3_pair(level2, level3, allow_default=True):
              level2 = _normalize_scenario(level2)
              if not level2:
                  return "", "", False
              raw_level3 = _s(level3)
              if not raw_level3 and allow_default:
                  return level2, DEFAULT_LEVEL3_V3[level2], True
              if raw_level3 in LEVEL3_BY_SCENARIO_V3[level2]:
                  return level2, raw_level3, True
              return level2, "", False


          def _v3_task(level2, level3, waybill_no="", business_reason=""):
              level2, level3, valid = _v3_pair(level2, level3)
              if not valid:
                  return None
              return {
                  "level2": level2,
                  "level3": level3,
                  "waybill_no": _normalize_waybill(waybill_no),
                  "business_reason": _s(business_reason)[:300],
              }


          def _v3_task_key(task):
              return (task.get("level2", ""), task.get("level3", ""), task.get("waybill_no", ""))


          def _v3_load_tasks(raw):
              try:
                  value = json.loads(_s(raw) or "[]")
              except Exception:
                  value = []
              if not isinstance(value, list):
                  value = []
              result = []
              seen = set()
              for item in value:
                  if not isinstance(item, dict):
                      continue
                  task = _v3_task(item.get("level2"), item.get("level3"), item.get("waybill_no"), item.get("business_reason"))
                  if not task or _v3_task_key(task) in seen:
                      continue
                  seen.add(_v3_task_key(task))
                  result.append(task)
                  if len(result) >= 4:
                      break
              return result


          def _v3_merge_tasks(existing, additions, active_key=None):
              result = []
              seen = set()
              for task in list(existing) + list(additions):
                  if not task:
                      continue
                  key = _v3_task_key(task)
                  if key == active_key or key in seen:
                      continue
                  seen.add(key)
                  result.append(task)
                  if len(result) >= 4:
                      break
              return result


          def _v3_label(task):
              labels = {
                  "tracking": "查询物流",
                  "query_package_volume": "查询包裹尺寸/体积",
                  "delivery_followup": "催查件",
                  "delivered_not_received": "签收未收到",
                  "change_address": "修改收件信息",
                  "complaint": "投诉/理赔",
                  "query_complaint": "查询工单进度",
                  "faq": "寄递规则咨询",
              }
              return labels.get(task.get("level2", ""), "其他问题")


          def _v3_hint(tasks, step):
              if not tasks:
                  return ""
              label = _v3_label(tasks[0])
              if step in TERMINAL_STEPS_V3:
                  return f"我还记得您要处理“{label}”，回复“继续”即可接着处理。"
              return f"当前事项完成后，我还会继续处理“{label}”。"


          def _v3_fallback_pair(query, previous_scenario, has_waybill):
              q = _s(query)
              negated_levels = set()
              negation_markers = {
                  "tracking": ("不要查", "不查快递", "别查"),
                  "delivery_followup": ("不要催", "不用催", "别催"),
                  "change_address": ("不要改地址", "不改地址", "别改地址"),
                  "complaint": ("不要投诉", "不投诉", "别投诉"),
              }
              for level2, markers in negation_markers.items():
                  if any(marker in q for marker in markers):
                      negated_levels.add(level2)
              groups = (
                  ("delivered_not_received", "signed_not_received", ("签收但没收到", "显示签收", "签收未收到", "本人未收到")),
                  ("query_package_volume", "query_package_dimensions", ("体积", "尺寸", "长宽高")),
                  ("query_package_volume", "query_volume_weight", ("体积重",)),
                  ("query_complaint", "query_ticket_progress", ("工单进度", "投诉进度", "处理进度", "工单状态")),
                  ("change_address", "change_receiver_phone", ("改电话", "修改电话")),
                  ("change_address", "reschedule_delivery", ("预约派送", "改期")),
                  ("change_address", "change_receiver_address", ("改地址", "修改地址")),
                  ("complaint", "claim_damage", ("破损",)),
                  ("complaint", "claim_loss", ("遗失", "丢失")),
                  ("complaint", "general_complaint", ("投诉", "理赔", "赔付")),
                  ("delivery_followup", "tracking_not_updated", ("一直没更新", "物流没更新")),
                  ("delivery_followup", "ask_delay_reason", ("为什么这么慢", "怎么这么慢", "为什么慢", "太慢")),
                  ("delivery_followup", "urge_delivery", ("催件", "催派", "还没送")),
                  ("tracking", "query_current_status", ("查件", "查快递", "物流轨迹", "到哪里", "到哪了")),
              )
              for level2, level3, words in groups:
                  if level2 not in negated_levels and any(word in q for word in words):
                      return level2, level3
              if any(word in q for word in ("还要多久", "什么时候到", "多久能到")):
                  return ("delivery_followup", "ask_delivery_eta") if has_waybill else ("faq", "transit_time_policy")
              if any(word in q for word in ("能不能寄", "禁寄")):
                  return "faq", "prohibited_items_policy"
              if any(word in q for word in ("怎么收费", "价格")):
                  return "faq", "price_policy"
              compact = _compact(q)
              if compact in {"你好", "您好", "在吗"}:
                  return "conversation", "greeting"
              if compact in {"谢谢", "感谢"}:
                  return "conversation", "thanks"
              if previous_scenario and _looks_like_waybill_only(q):
                  return previous_scenario, DEFAULT_LEVEL3_V3.get(previous_scenario, "")
              return "fallback", "ambiguous_request"


          def main(
              semantic_text: str,
              query: str,
              prev_waybill: str,
              prev_phone: str,
              prev_scenario: str,
              prev_level3_intent: str,
              prev_pending_action: str,
              prev_current_step: str,
              prev_business_reason: str,
              prev_problem_description: str,
              prev_pending_tasks_json: str,
          ) -> dict:
              data = _parse_json(semantic_text)
              query_compact = _compact(query)
              previous_scenario = _normalize_scenario(prev_scenario)
              previous_level2, previous_level3, previous_pair_valid = _v3_pair(previous_scenario, prev_level3_intent)
              if not previous_pair_valid:
                  previous_level3 = DEFAULT_LEVEL3_V3.get(previous_scenario, "")
              previous_step = _s(prev_current_step) or "idle"
              pending_action = _s(prev_pending_action)
              pending_tasks = _v3_load_tasks(prev_pending_tasks_json)
              business_reason = _s(data.get("business_reason")) or _s(prev_business_reason)
              problem_description = _s(prev_problem_description)

              dialogue_act = _s(data.get("dialogue_act"))
              if dialogue_act not in DIALOGUE_ACTS_V3:
                  dialogue_act = "unknown"
              intent_relation = _s(data.get("intent_relation"))
              if intent_relation not in INTENT_RELATIONS_V3:
                  intent_relation = "single"

              slots = data.get("slots") if isinstance(data.get("slots"), dict) else {}
              current_waybill = _extract_waybill(query) or _normalize_waybill(slots.get("waybill_no")) or _normalize_waybill(data.get("waybill_no"))
              waybill_no = current_waybill or _normalize_waybill(prev_waybill)
              phone = _extract_phone(query) or _extract_phone(slots.get("phone")) or _extract_phone(data.get("phone")) or _s(prev_phone)

              raw_intents = data.get("intents")
              if not isinstance(raw_intents, list):
                  raw_intents = []
                  primary = data.get("primary_intent")
                  if isinstance(primary, dict):
                      raw_intents.append(primary)
                  secondary = data.get("secondary_intents")
                  if isinstance(secondary, list):
                      raw_intents.extend(item for item in secondary if isinstance(item, dict))
                  if not raw_intents and data.get("scenario"):
                      raw_intents.append({"level2": data.get("scenario"), "level3": data.get("level3_intent", ""), "confidence": data.get("confidence", 0.0), "polarity": "affirmed"})

              model_tasks = []
              invalid_affirmed_pair = False
              confidence = 0.0
              for item in raw_intents[:8]:
                  if not isinstance(item, dict):
                      continue
                  polarity = _s(item.get("polarity")) or "affirmed"
                  if polarity != "affirmed":
                      continue
                  level2, level3, valid = _v3_pair(item.get("level2") or item.get("scenario"), item.get("level3") or item.get("level3_intent"))
                  if not valid:
                      invalid_affirmed_pair = True
                      continue
                  intent_slots = item.get("slots") if isinstance(item.get("slots"), dict) else {}
                  intent_waybill = _normalize_waybill(intent_slots.get("waybill_no"))
                  task = _v3_task(level2, level3, intent_waybill or current_waybill or waybill_no, business_reason)
                  if task and _v3_task_key(task) not in {_v3_task_key(existing) for existing in model_tasks}:
                      model_tasks.append(task)
                      if not confidence:
                          confidence = _confidence(item.get("confidence"))

              if len(model_tasks) > 1:
                  business_tasks = [task for task in model_tasks if task["level2"] not in {"conversation", "fallback"}]
                  if business_tasks:
                      model_tasks = business_tasks

              if not model_tasks and not raw_intents and not invalid_affirmed_pair and dialogue_act not in {"provide_slot", "confirm", "deny", "cancel", "continue", "human_request"}:
                  level2, level3 = _v3_fallback_pair(query, previous_scenario, bool(waybill_no))
                  fallback_task = _v3_task(level2, level3, current_waybill or waybill_no, business_reason)
                  if fallback_task:
                      model_tasks = [fallback_task]

              # 双重守护：即使快速路径未生效或模型返回 fallback，
              # “明确等待运单号 + 纯合法运单号”仍必须继续原任务。
              if previous_scenario and previous_step == "waiting_waybill" and _looks_like_waybill_only(query):
                  inherited = _v3_task(previous_scenario, previous_level3, current_waybill, business_reason)
                  model_tasks = [inherited] if inherited else []
                  invalid_affirmed_pair = False
                  dialogue_act = "provide_slot"
                  intent_relation = "single"

              selected_level2 = previous_scenario
              selected_level3 = previous_level3

              def finish(
                  scenario,
                  result_confidence,
                  result_waybill,
                  result_phone,
                  missing,
                  tool_name,
                  need_human,
                  clarify_question,
                  result_reason,
                  direct_reply,
                  result_pending_action,
                  current_step,
                  result_problem_description="",
                  result_level3="",
                  task_type="clarify_or_handoff",
              ):
                  level2 = _normalize_scenario(scenario) or "fallback"
                  candidate_level3 = result_level3 or (selected_level3 if level2 == selected_level2 else "")
                  level2, level3, valid = _v3_pair(level2, candidate_level3)
                  if not valid:
                      level3 = DEFAULT_LEVEL3_V3[level2]
                  queue = _v3_merge_tasks(pending_tasks, [], (level2, level3, _normalize_waybill(result_waybill)))
                  hint = _v3_hint(queue, current_step)
                  ready_hint = _v3_hint(queue, "completed")
                  if direct_reply and hint:
                      clarify_question = (_s(clarify_question) + "\n\n" + hint).strip()
                  result = _result(
                      level2, result_confidence, result_waybill, result_phone, missing, tool_name,
                      need_human, clarify_question, result_reason, direct_reply,
                      result_pending_action, current_step, result_problem_description,
                  )
                  result.update({
                      "level2_intent": level2,
                      "level3_intent": level3,
                      "dialogue_act": dialogue_act,
                      "intent_relation": intent_relation,
                      "pending_tasks_json": json.dumps(queue, ensure_ascii=False),
                      "pending_task_hint": hint,
                      "pending_task_ready_hint": ready_hint,
                      "task_type": task_type,
                  })
                  return result

              cancel_all = query_compact == "全部取消"
              if cancel_all:
                  pending_tasks = []

              if pending_action in WRITE_TOOLS and query_compact in CANCEL_WORDS:
                  return finish(
                      previous_scenario or "conversation", 1.0, waybill_no, phone, [], "none", False,
                      "已取消本次操作，没有提交任何业务变更。",
                      _s(prev_business_reason) or business_reason, True, "", "cancelled",
                      problem_description, previous_level3,
                  )
              if pending_action in WRITE_TOOLS and query_compact in CONFIRM_WORDS:
                  return finish(
                      previous_scenario or "fallback", 1.0, waybill_no, phone, [], pending_action, False,
                      "", _s(prev_business_reason) or business_reason, False, "", "processing",
                      problem_description, previous_level3, "guarded_write",
                  )
              if pending_action in WRITE_TOOLS:
                  return finish(
                      previous_scenario or "fallback", 1.0, waybill_no, phone, [], "none", False,
                      "当前有待确认的写操作。为避免误操作，请先明确回复“确认”或“取消”。",
                      _s(prev_business_reason) or business_reason, True, pending_action,
                      previous_step or "waiting_confirmation", problem_description, previous_level3, "guarded_write",
                  )

              explicit_human = query_compact in {"人工客服", "转人工", "转人工客服", "真人客服", "我要转人工客服"}
              if dialogue_act == "human_request" or explicit_human or _as_bool(data.get("need_human")):
                  return finish(
                      previous_scenario or (model_tasks[0]["level2"] if model_tasks else "fallback"), confidence,
                      waybill_no, phone, [], "none", True,
                      "这个问题建议由人工客服进一步核实。请通过当前页面的人工客服入口转接；如暂时没有入口，请稍后重试。",
                      business_reason, True, "", "human_handoff", problem_description,
                      previous_level3 or (model_tasks[0]["level3"] if model_tasks else ""),
                  )

              if query_compact in CANCEL_WORDS:
                  message = "已取消当前事项。" if previous_scenario and previous_step not in TERMINAL_STEPS_V3 else "当前没有待取消的业务操作。"
                  if cancel_all:
                      message = "已取消当前事项和全部后续待办，没有提交业务变更。"
                  return finish(
                      previous_scenario or "conversation", 1.0, waybill_no, phone, [], "none", False,
                      message, business_reason, True, "", "cancelled", problem_description, previous_level3,
                  )

              promoted_task = None
              if dialogue_act == "continue" or (query_compact in CONTINUE_WORDS_V3 and previous_step in TERMINAL_STEPS_V3):
                  if pending_tasks:
                      promoted_task = pending_tasks.pop(0)
                      model_tasks = [promoted_task]
                      selected_level2 = promoted_task["level2"]
                      selected_level3 = promoted_task["level3"]
                      waybill_no = promoted_task.get("waybill_no") or waybill_no
                      business_reason = promoted_task.get("business_reason") or business_reason
                  else:
                      return finish(
                          previous_scenario or "conversation", 1.0, waybill_no, phone, [], "none", False,
                          "当前没有待处理的后续任务。如有新问题，请直接告诉我。",
                          business_reason, True, "", "completed", problem_description, previous_level3, "conversation",
                      )

              if invalid_affirmed_pair and not model_tasks:
                  return finish(
                      previous_scenario or "fallback", confidence, waybill_no, phone, [], "none", False,
                      "我还不能可靠地将这个问题映射到已配置的客服场景，请换一种说法，或选择转人工。",
                      business_reason, True, "", "waiting_intent", problem_description, previous_level3,
                  )

              if raw_intents and not model_tasks:
                  return finish(
                      previous_scenario or "fallback", confidence, waybill_no, phone, [], "none", False,
                      "我还不能确认您是否要办理这项业务。请明确告诉我要处理哪一项，我不会根据否定或不确定诉求调用 Tool。",
                      business_reason, True, "", "waiting_intent", problem_description, previous_level3,
                  )

              if intent_relation == "alternative" and len(model_tasks) >= 2:
                  choices = "、".join(f"“{_v3_label(task)}”" for task in model_tasks[:3])
                  return finish(
                      previous_scenario or "fallback", confidence, waybill_no, phone, [], "none", False,
                      f"您说的是选择关系。请确认先处理 {choices} 中的哪一项，我不会自动同时执行。",
                      business_reason, True, "", previous_step, problem_description, previous_level3,
                  )

              if model_tasks and intent_relation == "parallel":
                  priority = {"read_tool": 0, "knowledge_rag": 0, "read_then_guarded_write": 1, "guarded_write": 2, "unsupported_or_handoff": 3, "clarify_or_handoff": 4}
                  model_tasks = sorted(model_tasks, key=lambda task: priority.get(INTENT_REGISTRY_V3[_v3_task_key(task)[:2]][0], 5))

              active_busy = bool(previous_scenario and previous_step not in TERMINAL_STEPS_V3)
              if model_tasks and not promoted_task:
                  first = model_tasks[0]
                  first_differs = (first["level2"], first["level3"]) != (previous_scenario, previous_level3)
                  explicit_switch = dialogue_act in {"correct", "switch_task"} or intent_relation in {"correction", "cancel_previous"}
                  if active_busy and first_differs and not explicit_switch:
                      pending_tasks = _v3_merge_tasks(pending_tasks, model_tasks)
                      selected_level2 = previous_scenario
                      selected_level3 = previous_level3
                      return finish(
                          previous_scenario, confidence, _normalize_waybill(prev_waybill), _s(prev_phone), [], "none", False,
                          "当前事项还没处理完。我已记住新诉求；请先继续补充当前信息，或明确说“取消”。",
                          business_reason, True, "", previous_step, problem_description, previous_level3,
                      )
                  if explicit_switch and intent_relation in {"correction", "cancel_previous"}:
                      pending_tasks = []
                  selected_level2 = first["level2"]
                  selected_level3 = first["level3"]
                  waybill_no = first.get("waybill_no") or waybill_no
                  pending_tasks = _v3_merge_tasks(pending_tasks, model_tasks[1:], _v3_task_key(first))
              elif not model_tasks:
                  selected_level2 = previous_scenario or "fallback"
                  selected_level3 = previous_level3 or DEFAULT_LEVEL3_V3[selected_level2]

              answer = _yes_no(query)
              continuing_same_task = (selected_level2, selected_level3) == (previous_scenario, previous_level3) and dialogue_act not in {"new_request", "correct", "switch_task"}
              if previous_step == "waiting_self_pickup_confirmation" and continuing_same_task:
                  if answer == "yes" or dialogue_act == "confirm":
                      return finish(
                          "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                          "好的，您可以按代收点或网点的通知自行取件。取件时请携带有效凭证并留意营业时间。",
                          business_reason, True, "", "completed", "", previous_level3, "read_then_guarded_write",
                      )
                  if answer == "no" or dialogue_act == "deny":
                      if phone:
                          return finish(
                              "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                              "请简要描述需要网点核实的问题，例如“并非本人要求自取，希望继续派送”。",
                              business_reason, True, "", "waiting_expedite_description", problem_description,
                              previous_level3, "read_then_guarded_write",
                          )
                      return finish(
                          "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                          "为了登记网点核实工单，请提供可联系的 11 位手机号。",
                          business_reason, True, "", "waiting_expedite_phone", problem_description,
                          previous_level3, "read_then_guarded_write",
                      )
                  return finish(
                      "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                      "请确认您是否愿意按代收点通知自行取件，并回复“是”或“否”。",
                      business_reason, True, "", previous_step, problem_description, previous_level3, "read_then_guarded_write",
                  )

              if previous_step == "waiting_signed_confirmation" and continuing_same_task:
                  if answer == "yes" or dialogue_act == "confirm":
                      return finish(
                          "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                          "好的，确认您已收到包裹，本次催查已结束。",
                          business_reason, True, "", "completed", "", previous_level3, "read_tool",
                      )
                  if answer == "no" or dialogue_act == "deny":
                      selected_level2 = "delivered_not_received"
                      selected_level3 = "signed_not_received"
                      return finish(
                          "delivered_not_received", 1.0, waybill_no, phone, [], "none", False,
                          "该运单显示已签收，但您反馈未收到。请先向家人、门卫或代收点核实；“签收未收到”自动处理流程正在建设中，如仍未找到，请转人工客服进一步核实。",
                          business_reason, True, "", "signed_not_received_fallback", "", "signed_not_received", "read_tool",
                      )
                  return finish(
                      "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                      "请确认您是否已经收到包裹，并回复“已收到”或“未收到”。",
                      business_reason, True, "", previous_step, problem_description, previous_level3, "read_tool",
                  )

              if previous_step == "waiting_expedite_phone" and continuing_same_task:
                  if phone:
                      return finish(
                          "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                          "手机号已记录。请简要描述需要网点核实的问题，例如“并非本人要求自取，希望继续派送”。",
                          business_reason, True, "", "waiting_expedite_description", problem_description,
                          previous_level3, "read_then_guarded_write",
                      )
                  return finish(
                      "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                      "未识别到有效手机号，请输入 11 位中国大陆手机号。",
                      business_reason, True, "", previous_step, problem_description, previous_level3, "read_then_guarded_write",
                  )

              if previous_step == "waiting_expedite_description" and continuing_same_task:
                  description = _s(query)[:500]
                  if len(description) < 4 or _extract_phone(description):
                      return finish(
                          "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                          "请用一句话描述需要网点核实的问题，至少 4 个字。",
                          business_reason, True, "", previous_step, problem_description, previous_level3, "read_then_guarded_write",
                      )
                  confirm_text = f"请确认工单信息：运单号 {waybill_no}，联系电话 {_mask_phone(phone)}，问题描述：{description}。确认提交请回复“确认”，不提交请回复“取消”。"
                  return finish(
                      "delivery_followup", 1.0, waybill_no, phone, [], "none", False,
                      confirm_text, description, True, "create_expedite_work_order",
                      "waiting_expedite_work_order_confirmation", description, previous_level3, "read_then_guarded_write",
                  )

              if query_compact in CONFIRM_WORDS:
                  return finish(
                      previous_scenario or "fallback", 1.0, waybill_no, phone, [], "none", False,
                      "当前没有待确认的业务操作，请先说明需要办理的事项。",
                      business_reason, True, "", previous_step, problem_description, previous_level3,
                  )

              scenario = selected_level2 or "fallback"
              level3 = selected_level3 or DEFAULT_LEVEL3_V3.get(scenario, "ambiguous_request")
              if confidence and confidence < 0.45 and scenario not in {"conversation", "fallback"}:
                  selected_level2 = "fallback"
                  selected_level3 = "ambiguous_request"
                  return finish(
                      "fallback", confidence, waybill_no, phone, [], "none", False,
                      "我还不能确定您的具体诉求。请说明您要查件、催派、改地址、投诉理赔，还是咨询寄递规则。",
                      business_reason, True, "", "waiting_intent", problem_description, "ambiguous_request",
                  )

              missing = data.get("missing_slots") or []
              if not isinstance(missing, list):
                  missing = [_s(missing)]
              missing = [_s(item) for item in missing if _s(item)]
              if scenario in NEED_WAYBILL and not waybill_no and "waybill_no" not in missing:
                  missing.append("waybill_no")
              if waybill_no:
                  missing = [item for item in missing if item != "waybill_no"]
              if "waybill_no" in missing:
                  return finish(
                      scenario, confidence, waybill_no, phone, missing, "none", False,
                      "为了继续帮您处理，请提供运单号。您可以直接发送完整运单号。",
                      business_reason, True, "", "waiting_waybill", problem_description, level3,
                      INTENT_REGISTRY_V3[(scenario, level3)][0],
                  )

              task_type, tool_name = INTENT_REGISTRY_V3.get((scenario, level3), ("clarify_or_handoff", "none"))
              if scenario == "query_complaint":
                  return finish(
                      scenario, confidence, waybill_no, phone, [], "none", False,
                      "工单进度查询能力暂未接入，请提供工单号并通过人工客服核实。",
                      business_reason, True, "", "waiting_ticket_query", problem_description, level3, task_type,
                  )
              if scenario == "conversation":
                  if level3 in {"thanks", "praise_or_polite"}:
                      reply = "谢谢您的认可，能帮到您我也很开心。如果还要继续处理当前运单，直接告诉我就可以。"
                  else:
                      reply = "您好，我在。您可以直接告诉我想查件、查体积、催派、反馈签收未收到、改地址、投诉理赔，还是咨询寄递规则。"
                  return finish(
                      scenario, confidence, waybill_no, phone, [], "none", False, reply,
                      business_reason, True, "", "completed", problem_description, level3, task_type,
                  )
              if scenario == "fallback":
                  return finish(
                      scenario, confidence, waybill_no, phone, [], "none", False,
                      _s(data.get("clarify_question")) or "请说明您要查件、查包裹体积、催派、反馈签收未收到、修改地址、投诉理赔，还是咨询寄递规则。",
                      business_reason, True, "", "waiting_intent", problem_description, level3, task_type,
                  )

              if tool_name in WRITE_TOOLS:
                  confirm_text = f"将为运单 {waybill_no} 创建投诉/理赔预受理工单，最终结果以审核为准。请回复“确认”或“取消”。"
                  return finish(
                      scenario, confidence, waybill_no, phone, [], "none", False, confirm_text,
                      business_reason, True, tool_name, "waiting_confirmation", problem_description, level3, task_type,
                  )

              return finish(
                  scenario, confidence, waybill_no, phone, [], tool_name, False, "", business_reason,
                  False, "", "completed" if tool_name == "none" else "processing",
                  problem_description, level3, task_type,
              )

