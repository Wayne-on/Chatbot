    nodes:
    - data:
        desc: 仅接收用户当前聊天消息；业务参数在对话中按需收集
        selected: false
        title: 开始
        type: start
        variables: []
      height: 90
      id: start
      position:
        x: 30
        y: 260
      positionAbsolute:
        x: 30
        y: 260
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |-
          import json
          import re


          CONFIRM_WORDS = {"确认", "确定", "同意", "提交", "可以提交", "确认提交"}
          CANCEL_WORDS = {"取消", "算了", "不用了", "不提交", "取消操作", "全部取消"}
          CONTINUE_WORDS = {"继续", "下一个", "下一项", "继续处理", "处理下一项"}
          YES_WORDS = {"是", "是的", "对", "可以", "已收到", "收到了", "我收到了", "自己取", "我自己取", "去取"}
          NO_WORDS = {"否", "不是", "不", "不可以", "不能", "未收到", "没收到", "没有收到", "不去取", "不自取"}
          HUMAN_WORDS = {"转人工", "转人工客服", "人工客服", "真人客服", "我要转人工客服"}
          TERMINAL_STEPS = {"idle", "completed", "cancelled", "human_handoff", "signed_not_received_fallback", "work_order_tool_not_configured"}


          def _s(value):
              return str(value or "").strip()


          def _compact(value):
              return re.sub(r"[\s，。！？、,.!?；;\:：]+", "", _s(value))


          def _waybill(value):
              candidate = re.sub(r"[\s-]", "", _s(value).upper())
              if re.fullmatch(r"JT\d{8,13}", candidate):
                  return candidate
              if re.fullmatch(r"\d{10,15}", candidate):
                  if not (len(candidate) == 11 and re.fullmatch(r"1[3-9]\d{9}", candidate)):
                      return candidate
              return ""


          def _phone(value):
              candidate = re.sub(r"\s", "", _s(value))
              return candidate if re.fullmatch(r"1[3-9]\d{9}", candidate) else ""


          def _pending_count(raw):
              try:
                  value = json.loads(_s(raw) or "[]")
                  return len(value) if isinstance(value, list) else 0
              except Exception:
                  return 0


          def main(
              query: str,
              prev_scenario: str,
              prev_level3_intent: str,
              prev_current_step: str,
              prev_pending_action: str,
              prev_pending_tasks_json: str,
          ) -> dict:
              compact = _compact(query)
              step = _s(prev_current_step)
              pending_action = _s(prev_pending_action)
              level2 = _s(prev_scenario)
              level3 = _s(prev_level3_intent)
              semantic = {
                  "intents": [],
                  "intent_relation": "single",
                  "dialogue_act": "unknown",
                  "slots": {"waybill_no": "", "phone": ""},
                  "need_human": False,
                  "business_reason": "",
              }

              if pending_action and compact in CONFIRM_WORDS:
                  semantic["dialogue_act"] = "confirm"
              elif pending_action and compact in CANCEL_WORDS:
                  semantic["dialogue_act"] = "cancel"
              elif not pending_action and compact in CONFIRM_WORDS:
                  semantic["dialogue_act"] = "confirm"
              elif compact in CANCEL_WORDS:
                  semantic["dialogue_act"] = "cancel"
                  if compact == "全部取消":
                      semantic["intent_relation"] = "cancel_previous"
              elif compact in HUMAN_WORDS:
                  semantic["dialogue_act"] = "human_request"
                  semantic["need_human"] = True
              elif step == "waiting_waybill" and _waybill(query):
                  semantic["dialogue_act"] = "provide_slot"
                  semantic["slots"]["waybill_no"] = _waybill(query)
                  semantic["intents"] = [{"level2": level2 or "tracking", "level3": level3, "confidence": 1.0, "polarity": "affirmed"}]
              elif _waybill(query) and _waybill(query) == re.sub(r"[\s-]", "", _s(query).upper()):
                  semantic["dialogue_act"] = "provide_slot"
                  semantic["slots"]["waybill_no"] = _waybill(query)
                  semantic["intents"] = [{"level2": level2 or "tracking", "level3": level3, "confidence": 1.0, "polarity": "affirmed"}]
              elif step == "waiting_expedite_phone" and _phone(query):
                  semantic["dialogue_act"] = "provide_slot"
                  semantic["slots"]["phone"] = _phone(query)
              elif step in {"waiting_self_pickup_confirmation", "waiting_signed_confirmation"} and compact in YES_WORDS | NO_WORDS:
                  semantic["dialogue_act"] = "confirm" if compact in YES_WORDS else "deny"
              elif step in TERMINAL_STEPS and compact in CONTINUE_WORDS and _pending_count(prev_pending_tasks_json):
                  semantic["dialogue_act"] = "continue"
              else:
                  return {"use_llm": "true", "semantic_json": ""}

              return {"use_llm": "false", "semantic_json": json.dumps(semantic, ensure_ascii=False)}
        code_language: python3
        desc: 只拦截当前 State 下完全确定的输入；自由表达、否定、纠正和切换仍进入大模型
        outputs:
          semantic_json:
            type: string
