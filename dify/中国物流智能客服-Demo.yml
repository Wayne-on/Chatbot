          \ \"delivery_time\"\n        policies.append(\"运输时效会受始发地、目的地、天气、分拨中转、清关和末端派送影响。\"\
          )\n        policies.append(\"如已提供运单号，建议优先查询实时轨迹后再判断是否异常。\")\n    elif any(k\
